name: ai-research-env

channels:
  - pytorch
  - conda-forge
  - defaults

channel_priority: strict

dependencies:
  # ---------------------------------------------------------------------------
  # Runtime
  # ---------------------------------------------------------------------------
  - python=3.12
  - openjdk=25
  - pip

  # ---------------------------------------------------------------------------
  # Core scientific Python
  # ---------------------------------------------------------------------------
  - numpy
  - pandas
  - scipy
  - scikit-learn

  # ---------------------------------------------------------------------------
  # Visualization and notebooks
  # ---------------------------------------------------------------------------
  - matplotlib
  - jupyterlab
  - ipykernel
  - ipywidgets
  - tensorboard

  # ---------------------------------------------------------------------------
  # General utilities and configuration
  # ---------------------------------------------------------------------------
  - tqdm
  - rich
  - pyyaml
  - pydantic
  - python-dotenv
  - requests
  - typer
  - joblib

  # Configuration framework used heavily by the MEDS ecosystem
  - hydra-core
  - omegaconf

  # ---------------------------------------------------------------------------
  # Data I/O and local analytics
  # ---------------------------------------------------------------------------
  - pyarrow
  - duckdb
  - polars
  - h5py

  # ---------------------------------------------------------------------------
  # Performance
  # ---------------------------------------------------------------------------
  - numba

  # ---------------------------------------------------------------------------
  # Development and testing
  # ---------------------------------------------------------------------------
  - pytest
  - pytest-cov
  - ruff
  - mypy
  - pre-commit

  # ---------------------------------------------------------------------------
  # PyTorch stack
  #
  # Keep the base environment portable and CPU-capable across all supported
  # platforms. A separate CUDA/GPU image can be added when large-scale
  # foundation-model training begins.
  # ---------------------------------------------------------------------------
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly

  # ---------------------------------------------------------------------------
  # Foundation-model training and model infrastructure
  # ---------------------------------------------------------------------------
  - transformers
  - accelerate
  - lightning=2.5.*
  - torchmetrics
  - safetensors
  - einops

  # ---------------------------------------------------------------------------
  # TensorFlow
  #
  # Preserved from the existing general AI research environment.
  # ---------------------------------------------------------------------------
  - tensorflow=2.18.*

  # ---------------------------------------------------------------------------
  # MEDS ecosystem
  #
  # These packages are sourced from PyPI but are resolved and locked by
  # conda-lock as part of the same unified environment.
  #
  # Explicit constraints on the core MEDS schema and transform packages keep
  # the different MEDS components on the same compatible release families.
  # ---------------------------------------------------------------------------
  - pip:
      - "meds>=0.4.1,<0.5"
      - "MEDS-transforms>=0.6.7,<0.7"
      - "MEDS-extract[local_parallelism]>=0.6,<0.7"
      - "meds-torch-data[joblib]"
      - "MEDS-trajectory-evaluation"

# Target every platform supported by the current ai-research-env repository.
# conda-lock reads this nonstandard but supported field and produces one
# multi-platform conda-lock.yml.
platforms:
  - linux-64
  - linux-aarch64
  - osx-64
  - osx-arm64
  - win-64
