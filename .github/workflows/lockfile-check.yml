name: lockfile-check

on:
  pull_request:
    paths:
      - environment.yml
      - scripts/generate-lockfile.sh
      - .github/workflows/lockfile-check.yml
      - .github/workflows/lockfile-update.yml

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lockfiles-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solve:
    name: Solve unified environment
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "CANDIDATE_LOCK=${RUNNER_TEMP}/candidate-conda-lock.yml" \
            >> "${GITHUB_ENV}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          cache-downloads: true

      - name: Install conda-lock
        shell: bash
        run: |
          set -Eeuo pipefail

          micromamba install \
            -y \
            -n base \
            -c conda-forge \
            "conda-lock=3.*"

      - name: Generate candidate unified lock
        shell: bash
        env:
          CONDA_LOCK_SUBPROCESS_STDERR_LOG_LEVEL_OVERRIDE: INFO
        run: |
          set -Eeuo pipefail

          bash scripts/generate-lockfile.sh "${CANDIDATE_LOCK}"

      - name: Upload candidate unified lock
        uses: actions/upload-artifact@v7
        with:
          name: pr-candidate-unified-conda-lock-${{ github.run_id }}
          path: ${{ runner.temp }}/candidate-conda-lock.yml
          if-no-files-found: error
          retention-days: 14
