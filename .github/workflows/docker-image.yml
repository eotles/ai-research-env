name: docker-image

on:
  push:
    branches:
      - main
    paths:
      - conda-lock.yml
      - Dockerfile
      - scripts/smoke_test.py
      - .github/workflows/docker-image.yml

  workflow_dispatch:
    inputs:
      push_image:
        description: "Publish the image to GHCR after tests pass"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image
  cancel-in-progress: false

jobs:
  test-image:
    name: Test ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64

          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build native test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          platforms: ${{ matrix.platform }}
          tags: ai-research-env:test-${{ matrix.arch }}
          cache-from: type=gha,scope=docker-test-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-test-${{ matrix.arch }}

      - name: Validate Python dependency consistency
        shell: bash
        run: |
          set -Eeuo pipefail

          docker run \
            --rm \
            ai-research-env:test-${{ matrix.arch }} \
            python -m pip check

      - name: Run environment smoke test
        shell: bash
        run: |
          set -Eeuo pipefail

          docker run \
            --rm \
            ai-research-env:test-${{ matrix.arch }} \
            python /opt/ai-research-env/smoke_test.py

      - name: Validate Jupyter
        shell: bash
        run: |
          set -Eeuo pipefail

          docker run \
            --rm \
            ai-research-env:test-${{ matrix.arch }} \
            jupyter lab --version

  publish-image:
    name: Publish multi-architecture image

    needs:
      - test-image

    if: >
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.push_image
      )

    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
