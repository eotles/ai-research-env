name: lockfiles-update

on:
  # Normal behavior:
  # Regenerate and commit the canonical lockfile when the environment
  # definition changes.
  push:
    branches:
      - main
    paths:
      - environment.yml
      - scripts/generate-lockfile.sh
      - .github/workflows/lockfiles-update.yml

  # Weekly monitoring:
  # Freshly resolve the environment and report lockfile drift.
  # Scheduled runs never commit changes.
  schedule:
    - cron: "17 10 * * 1"

  # Manual execution:
  # Allows resolution and CI/CD testing without a meaningless source change.
  workflow_dispatch:
    inputs:
      commit_lockfile:
        description: "Commit the regenerated lockfile if it changed"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: lockfiles-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "CANDIDATE_LOCK=${RUNNER_TEMP}/candidate-conda-lock.yml" \
            >> "${GITHUB_ENV}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          cache-downloads: true

      - name: Install conda-lock
        shell: bash
        run: |
          set -Eeuo pipefail

          micromamba install \
            -y \
            -n base \
            -c conda-forge \
            "conda-lock=3.*"

      - name: Show solver versions
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Trigger: ${GITHUB_EVENT_NAME}"
          echo "MAMBA_EXE=${MAMBA_EXE}"

          "${MAMBA_EXE}" --version
          "${MAMBA_EXE}" run -n base conda-lock --version

      - name: Generate candidate unified lock
        id: generate
        continue-on-error: true
        shell: bash
        env:
          CONDA_LOCK_SUBPROCESS_STDERR_LOG_LEVEL_OVERRIDE: INFO
        run: |
          set -Eeuo pipefail

          bash scripts/generate-lockfile.sh "${CANDIDATE_LOCK}"

      - name: Report solve failure
        if: steps.generate.outcome != 'success'
        shell: bash
        run: |
          {
            echo "## Lockfile generation failed"
            echo
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- The multi-platform unified environment could not be resolved."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "::error::Unified lockfile generation failed."

      - name: Report lockfile drift
        if: steps.generate.outcome == 'success'
        shell: bash
        run: |
          set -Eeuo pipefail

          {
            echo "## Lockfile drift"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ ! -f conda-lock.yml ]]; then
            {
              echo "**Drift detected:** yes"
              echo
              echo "No committed canonical lockfile currently exists."
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::warning::No committed conda-lock.yml exists."
          elif ! cmp -s conda-lock.yml "${CANDIDATE_LOCK}"; then
            {
              echo "**Drift detected:** yes"
              echo
              echo "A fresh dependency solve differs from the committed lockfile."
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::warning::A fresh dependency solve produced lockfile drift."

            diff --brief conda-lock.yml "${CANDIDATE_LOCK}" || true
          else
            {
              echo "**Drift detected:** no"
              echo
              echo "The fresh dependency solve matches the committed lockfile."
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "Fresh solve matches the committed lockfile."
          fi

      - name: Upload candidate unified lock
        if: steps.generate.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: candidate-unified-conda-lock-${{ github.run_id }}
          path: ${{ runner.temp }}/candidate-conda-lock.yml
          if-no-files-found: error
          retention-days: 14

      - name: Commit and push changed lockfile
        if: >
          steps.generate.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            (
              github.event_name == 'workflow_dispatch' &&
              inputs.commit_lockfile
            )
          )
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ ! -f conda-lock.yml ]] || \
             ! cmp -s conda-lock.yml "${CANDIDATE_LOCK}"; then

            cp "${CANDIDATE_LOCK}" conda-lock.yml

            git config user.name "github-actions[bot]"
            git config user.email \
              "github-actions[bot]@users.noreply.github.com"

            git add conda-lock.yml
            git commit -m "Update unified conda lockfile"
            git push
          else
            echo "No lockfile changes to commit."
          fi

      - name: Report non-committing run
        if: >
          steps.generate.outcome == 'success' &&
          (
            github.event_name == 'schedule' ||
            (
              github.event_name == 'workflow_dispatch' &&
              !inputs.commit_lockfile
            )
          )
        shell: bash
        run: |
          {
            echo
            echo "## Commit behavior"
            echo
            echo "This was a check-only run. No lockfile changes were committed."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail workflow if lockfile generation failed
        if: steps.generate.outcome != 'success'
        shell: bash
        run: |
          echo "Unified lockfile generation failed."
          exit 1
