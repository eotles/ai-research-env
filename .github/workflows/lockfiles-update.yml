name: lockfiles-update

on:
  push:
    branches: [ main ]
    paths:
      - environment.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mamba-org/setup-micromamba@v2
        with:
          cache-downloads: true

      - name: Install conda-lock
        run: micromamba install -y -n base -c conda-forge conda-lock

      - name: Show solver versions
        shell: bash
        run: |
          echo "MAMBA_EXE=${MAMBA_EXE}"
          "${MAMBA_EXE}" --version
          micromamba run -n base conda-lock --version

      - name: Direct solve without Java
        continue-on-error: true
        timeout-minutes: 6
        shell: bash
        run: |
          sed '/^[[:space:]]*- openjdk=25[[:space:]]*$/d' \
            environment.yml > /tmp/environment-no-java.yml

          "${MAMBA_EXE}" create \
            --dry-run \
            --yes \
            --strict-channel-priority \
            --prefix /tmp/test-no-java \
            --file /tmp/environment-no-java.yml \
            -vv

      - name: Direct solve with Java
        continue-on-error: true
        timeout-minutes: 6
        shell: bash
        run: |
          "${MAMBA_EXE}" create \
            --dry-run \
            --yes \
            --strict-channel-priority \
            --prefix /tmp/test-with-java \
            --file environment.yml \
            -vv

      - name: Conda-lock linux-64 using Micromamba
        continue-on-error: true
        timeout-minutes: 6
        shell: bash
        env:
          CONDA_LOCK_SUBPROCESS_STDERR_LOG_LEVEL_OVERRIDE: INFO
        run: |
          mkdir -p locks

          micromamba run -n base conda-lock \
            --conda "${MAMBA_EXE}" \
            --without-cuda \
            --log-level DEBUG \
            --preserve-temp-dirs \
            --file environment.yml \
            --platform linux-64 \
            --kind explicit \
            --filename-template "locks/conda-{platform}.lock"

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update conda lockfiles"
            git push
          else
            echo "No lockfile changes."
          fi
