name: lockfiles-update

on:
  push:
    branches: [ main ]
    paths:
      - environment.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mamba-org/setup-micromamba@v2
        with:
          cache-downloads: true

      - name: Install conda-lock
        run: micromamba install -y -n base -c conda-forge conda-lock

      - name: Generate lockfiles
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p locks
      
          platforms=(
            linux-64
            linux-aarch64
            win-64
            osx-64
            osx-arm64
          )
      
          failed=0
      
          for platform in "${platforms[@]}"; do
            echo "::group::Generating lockfile for ${platform}"
            echo "Started ${platform} at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
      
            start_time=$(date +%s)
      
            timeout 5m micromamba run -n base conda-lock \
              -f environment.yml \
              -p "${platform}" \
              --kind explicit \
              --filename-template "locks/conda-{platform}.lock"
      
            status=$?
            end_time=$(date +%s)
            elapsed=$((end_time - start_time))
      
            echo "Finished ${platform} after $((elapsed / 60))m $((elapsed % 60))s"
      
            if [[ $status -eq 124 ]]; then
              echo "::error::${platform} timed out after 30 minutes"
              failed=1
            elif [[ $status -ne 0 ]]; then
              echo "::error::${platform} failed with exit code ${status}"
              failed=1
            else
              echo "${platform} completed successfully"
            fi
      
            echo "::endgroup::"
          done
      
          exit "$failed"

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update conda lockfiles"
            git push
          else
            echo "No lockfile changes."
          fi
