name: lockfiles-update

on:
  # Normal behavior:
  # Rebuild and commit lockfiles whenever the environment definition changes.
  push:
    branches:
      - main
    paths:
      - environment.yml
      - scripts/generate-lockfiles.sh
      - .github/workflows/lockfiles-update.yml

  # Weekly monitoring:
  # Re-solve the environment and report dependency-resolution failures or
  # lockfile drift. Scheduled runs never commit changes.
  schedule:
    - cron: "17 10 * * 1"

  # Manual execution:
  # Allows CI/CD and dependency resolution to be tested without making a
  # meaningless change to environment.yml.
  workflow_dispatch:
    inputs:
      commit_lockfiles:
        description: "Commit regenerated lockfiles if they changed"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: lockfiles-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "LOCK_SUMMARY_FILE=${RUNNER_TEMP}/lock-generation-summary.tsv" \
            >> "${GITHUB_ENV}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          cache-downloads: true

      - name: Install conda-lock
        shell: bash
        run: |
          set -Eeuo pipefail

          micromamba install \
            -y \
            -n base \
            -c conda-forge \
            "conda-lock=3.*"

      - name: Show solver versions
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Trigger: ${GITHUB_EVENT_NAME}"
          echo "MAMBA_EXE=${MAMBA_EXE}"

          "${MAMBA_EXE}" --version
          "${MAMBA_EXE}" run -n base conda-lock --version

      - name: Generate lockfiles
        id: generate
        continue-on-error: true
        shell: bash
        env:
          CONDA_LOCK_SUBPROCESS_STDERR_LOG_LEVEL_OVERRIDE: INFO
        run: |
          set -Eeuo pipefail

          bash scripts/generate-lockfiles.sh

      - name: Add platform results to workflow summary
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail

          {
            echo "## Platform solve results"
            echo

            if [[ -f "${LOCK_SUMMARY_FILE}" ]]; then
              echo "| Platform | Result | Duration | Exit code |"
              echo "|---|---:|---:|---:|"

              tail -n +2 "${LOCK_SUMMARY_FILE}" \
                | while IFS=$'\t' read -r platform status duration exit_code; do
                    echo "| ${platform} | ${status} | ${duration}s | ${exit_code} |"
                  done
            else
              echo "No platform summary file was produced."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Report solve failure
        if: steps.generate.outcome != 'success'
        shell: bash
        run: |
          {
            echo
            echo "## Lockfile generation failed"
            echo
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- One or more platform dependency solves failed."
            echo "- Review the **Generate lockfiles** step for solver output."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "::error::One or more platform lockfile solves failed."

      - name: Report lockfile drift
        if: steps.generate.outcome == 'success'
        shell: bash
        run: |
          set -Eeuo pipefail

          {
            echo
            echo "## Lockfile drift"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -n "$(git status --porcelain -- locks/)" ]]; then
            {
              echo "**Drift detected:** yes"
              echo
              echo "A fresh dependency solve produced changes relative to the committed lockfiles."
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::warning::A fresh dependency solve produced lockfile drift."

            echo
            echo "Changed lockfiles:"
            git status --short -- locks/

            echo
            echo "Diff summary:"
            git diff --stat -- locks/
          else
            {
              echo "**Drift detected:** no"
              echo
              echo "The fresh dependency solve matches the committed lockfiles."
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "Fresh solve matches the committed lockfiles."
          fi

      - name: Upload candidate explicit lockfiles
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: candidate-explicit-lockfiles-${{ github.run_id }}
          path: |
            locks/*.lock
            ${{ runner.temp }}/lock-generation-summary.tsv
          if-no-files-found: warn
          retention-days: 14

      - name: Commit and push changed lockfiles
        if: >
          steps.generate.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            (
              github.event_name == 'workflow_dispatch' &&
              inputs.commit_lockfiles
            )
          )
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ -n "$(git status --porcelain -- locks/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add locks/
            git commit -m "Update conda lockfiles"
            git push
          else
            echo "No lockfile changes to commit."
          fi

      - name: Report non-committing run
        if: >
          steps.generate.outcome == 'success' &&
          (
            github.event_name == 'schedule' ||
            (
              github.event_name == 'workflow_dispatch' &&
              !inputs.commit_lockfiles
            )
          )
        shell: bash
        run: |
          {
            echo
            echo "## Commit behavior"
            echo
            echo "This was a check-only run. No lockfile changes were committed."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Check-only run. No lockfile changes will be committed."

      - name: Fail workflow if lockfile generation failed
        if: steps.generate.outcome != 'success'
        shell: bash
        run: |
          echo "Lockfile generation failed. See the solver output above."
          exit 1
