name: environment-install-check

on:
  # Validate proposed environment changes before merge.
  pull_request:
    paths:
      - environment.yml
      - scripts/generate-lockfile.sh
      - scripts/smoke_test.py
      - .github/workflows/environment-install-check.yml

  push:
    branches:
      - main
    paths:
      - environment.yml
      - scripts/generate-lockfile.sh
      - scripts/smoke_test.py
      - .github/workflows/environment-install-check.yml

  # Periodically verify that the complete environment can still be freshly
  # locked, installed, and executed.
  schedule:
    - cron: "43 11 * * 1"

  # Allow an explicit end-to-end validation run.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: environment-install-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-lock:
    name: Generate unified lock
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "CANDIDATE_LOCK=${RUNNER_TEMP}/candidate-conda-lock.yml" \
            >> "${GITHUB_ENV}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          cache-downloads: true

      - name: Install conda-lock
        shell: bash
        run: |
          set -Eeuo pipefail

          micromamba install \
            -y \
            -n base \
            -c conda-forge \
            "conda-lock=3.*"

      - name: Show tool versions
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "MAMBA_EXE=${MAMBA_EXE}"

          "${MAMBA_EXE}" --version
          "${MAMBA_EXE}" run -n base conda-lock --version

      - name: Generate candidate unified lock
        shell: bash
        env:
          CONDA_LOCK_SUBPROCESS_STDERR_LOG_LEVEL_OVERRIDE: INFO
        run: |
          set -Eeuo pipefail

          bash scripts/generate-lockfile.sh "${CANDIDATE_LOCK}"

      - name: Upload candidate unified lock
        uses: actions/upload-artifact@v7
        with:
          name: candidate-unified-conda-lock-${{ github.run_id }}
          path: ${{ runner.temp }}/candidate-conda-lock.yml
          if-no-files-found: error
          retention-days: 14

  install-and-test:
    name: ${{ matrix.platform }}
    needs:
      - generate-lock

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            runner: ubuntu-24.04

          - platform: linux-aarch64
            runner: ubuntu-24.04-arm

          - platform: osx-64
            runner: macos-15-intel

          - platform: osx-arm64
            runner: macos-15

          - platform: win-64
            runner: windows-2025

    env:
      TEST_ENV_NAME: ai-research-env-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download candidate unified lock
        uses: actions/download-artifact@v8
        with:
          name: candidate-unified-conda-lock-${{ github.run_id }}
          path: ${{ runner.temp }}/candidate-lock

      - name: Configure runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "CANDIDATE_LOCK=${RUNNER_TEMP}/candidate-lock/candidate-conda-lock.yml" \
            >> "${GITHUB_ENV}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          cache-downloads: true

      - name: Install conda-lock
        shell: bash
        run: |
          set -Eeuo pipefail

          micromamba install \
            -y \
            -n base \
            -c conda-forge \
            "conda-lock=3.*"

      - name: Install complete locked environment
        shell: bash
        run: |
          set -Eeuo pipefail

          "${MAMBA_EXE}" run -n base conda-lock install \
            --conda "${MAMBA_EXE}" \
            --name "${TEST_ENV_NAME}" \
            "${CANDIDATE_LOCK}"

      - name: Show installed Python version
        shell: bash
        run: |
          set -Eeuo pipefail

          "${MAMBA_EXE}" run \
            -n "${TEST_ENV_NAME}" \
            python --version

      - name: Validate installed dependency consistency
        shell: bash
        run: |
          set -Eeuo pipefail

          "${MAMBA_EXE}" run \
            -n "${TEST_ENV_NAME}" \
            python -m pip check

      - name: Run environment smoke test
        shell: bash
        run: |
          set -Eeuo pipefail

          "${MAMBA_EXE}" run \
            -n "${TEST_ENV_NAME}" \
            python scripts/smoke_test.py

      - name: Report platform success
        shell: bash
        run: |
          {
            echo "## ${{
              matrix.platform
            }} environment validation succeeded"
            echo
            echo "- Unified lock installation: passed"
            echo "- Dependency consistency: passed"
            echo "- Runtime smoke test: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
