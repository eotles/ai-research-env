name: lockfiles-check

on:
  pull_request:
    paths:
      - environment.yml
      - scripts/generate-lockfiles.sh
      - .github/workflows/lockfiles-check.yml
      - .github/workflows/lockfiles-update.yml

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lockfiles-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solve:
    name: Solve all supported platforms
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure runtime paths
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "LOCK_SUMMARY_FILE=${RUNNER_TEMP}/lock-generation-summary.tsv" \
            >> "${GITHUB_ENV}"

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          cache-downloads: true
          
      - name: Install conda-lock
        shell: bash
        run: |
          set -Eeuo pipefail

          micromamba install \
            -y \
            -n base \
            -c conda-forge \
            "conda-lock=3.*"

      - name: Show solver versions
        shell: bash
        run: |
          set -Eeuo pipefail

          "${MAMBA_EXE}" --version
          "${MAMBA_EXE}" run -n base conda-lock --version

      - name: Solve environment for all supported platforms
        id: solve
        continue-on-error: true
        shell: bash
        env:
          CONDA_LOCK_SUBPROCESS_STDERR_LOG_LEVEL_OVERRIDE: INFO
        run: |
          set -Eeuo pipefail

          bash scripts/generate-lockfiles.sh

      - name: Add platform results to workflow summary
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail

          {
            echo "## Platform solve results"
            echo

            if [[ -f "${LOCK_SUMMARY_FILE}" ]]; then
              echo "| Platform | Result | Duration | Exit code |"
              echo "|---|---:|---:|---:|"

              tail -n +2 "${LOCK_SUMMARY_FILE}" \
                | while IFS=$'\t' read -r platform status duration exit_code; do
                    echo "| ${platform} | ${status} | ${duration}s | ${exit_code} |"
                  done
            else
              echo "No platform summary file was produced."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload candidate explicit lockfiles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-candidate-explicit-lockfiles-${{ github.run_id }}
          path: |
            locks/*.lock
            ${{ runner.temp }}/lock-generation-summary.tsv
          if-no-files-found: warn
          retention-days: 14

      - name: Fail if any platform could not be solved
        if: steps.solve.outcome != 'success'
        shell: bash
        run: |
          echo "One or more supported platforms could not be resolved."
          exit 1

      - name: Report success
        if: steps.solve.outcome == 'success'
        shell: bash
        run: |
          {
            echo
            echo "All supported platforms resolved successfully."
            echo
            echo "Generated lockfiles are validation artifacts only."
            echo "The main-branch update workflow remains responsible for committing lockfile changes."
          } >> "${GITHUB_STEP_SUMMARY}"
